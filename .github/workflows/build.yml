name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
    
    - name: Install cargo-ndk
      run: cargo install cargo-ndk
    
    - name: Build Rust Library
      run: |
        cd rust
        cargo ndk -t arm64-v8a -- build --release
        ls -la target/aarch64-linux-android/release/
    
    - name: Create libs directory
      run: mkdir -p app/libs/arm64-v8a
    
    - name: Copy Rust library
      run: |
        cp rust/target/aarch64-linux-android/release/*.so app/libs/arm64-v8a/ 2>/dev/null || echo "No .so files found"
        ls -la app/libs/arm64-v8a/
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: List APK contents
      run: |
        find app/build/outputs -name "*.apk" -exec unzip -l {} \;
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: directlink-app-debug
        path: app/build/outputs/apk/debug/*.apk
